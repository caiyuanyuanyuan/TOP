<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们结婚啦</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="supergirl.ogg" type="audio/ogg">
    </audio>

    <!-- 开屏 -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <!-- 弧形文字 -->
            <svg class="arc-text" viewBox="0 0 400 230" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <path id="arcPath" d="M 20 210 A 190 190 0 0 1 380 210" fill="none"/>
                </defs>
                <!-- 装饰星点 -->
                <text x="18" y="212" class="deco-star" fill="#fff">✦</text>
                <text x="374" y="212" class="deco-star" fill="#fff">✦</text>
                <!-- 文字描边层 -->
                <text class="arc-stroke" fill="none">
                    <textPath href="#arcPath" startOffset="50%" text-anchor="middle">
                        欢迎参加TOP五人婚礼
                    </textPath>
                </text>
                <!-- 文字主色层 -->
                <text class="arc-main" fill="#ffffff">
                    <textPath href="#arcPath" startOffset="50%" text-anchor="middle">
                        欢迎参加TOP五人婚礼
                    </textPath>
                </text>
            </svg>
            <!-- 底部装饰线 -->
            <div class="splash-divider">
                <span class="line"></span>
                <span class="diamond">◆</span>
                <span class="line"></span>
            </div>
        </div>
        <!-- 漂浮光点 -->
        <div class="float-dots">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <!-- 星光粒子层 -->
    <div id="particles" class="particles"></div>

    <!-- 蝴蝶层 -->
    <div id="butterflies" class="butterflies"></div>

    <!-- 主页面 -->
    <div id="mainPage" class="main-page hidden">
        <!-- 右上角音乐按钮 -->
        <button id="musicBtn" class="music-btn" title="音乐开关">🔊</button>

        <!-- 左上角请柬按钮 -->
        <button id="inviteBtn" class="invite-btn" title="婚礼请柬">💌</button>

        <!-- 左下角签到按钮 -->
        <button id="checkinBtn" class="checkin-btn" title="签到">💝</button>

        <!-- 摩天轮容器 -->
        <div class="ferris-container">
            <div id="ferrisWheel" class="ferris-wheel">
                <!-- 朱志鑫 -->
                <div class="photo-card" data-id="0" data-name="朱志鑫" data-color="#FFD700">
                    <div class="photo-frame frame-yellow">
                        <img src="zzx.jpg" alt="朱志鑫" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=photo-placeholder>朱志鑫</div>'">
                    </div>
                </div>
                <!-- 张泽禹 -->
                <div class="photo-card" data-id="1" data-name="张泽禹" data-color="#32CD32">
                    <div class="photo-frame frame-green">
                        <img src="zzy.jpg" alt="张泽禹" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=photo-placeholder>张泽禹</div>'">
                    </div>
                </div>
                <!-- 张极 -->
                <div class="photo-card" data-id="2" data-name="张极" data-color="#FF8C00">
                    <div class="photo-frame frame-orange">
                        <img src="zj.jpg" alt="张极" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=photo-placeholder>张极</div>'">
                    </div>
                </div>
                <!-- 左航 -->
                <div class="photo-card" data-id="3" data-name="左航" data-color="#1E90FF">
                    <div class="photo-frame frame-blue">
                        <img src="zh.jpg" alt="左航" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=photo-placeholder>左航</div>'">
                    </div>
                </div>
                <!-- 苏新皓 -->
                <div class="photo-card" data-id="4" data-name="苏新皓" data-color="#DC143C">
                    <div class="photo-frame frame-red">
                        <img src="sxh.jpg" alt="苏新皓" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=photo-placeholder>苏新皓</div>'">
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部新郎文案 -->
        <div class="bottom-text">
            <div class="groom-list">
                <span style="color:#FFD700">新郎朱志鑫</span>
                <span class="dot">·</span>
                <span style="color:#32CD32">新郎张泽禹</span>
                <span class="dot">·</span>
                <span style="color:#FF8C00">新郎张极</span>
                <span class="dot">·</span>
                <span style="color:#1E90FF">新郎左航</span>
                <span class="dot">·</span>
                <span style="color:#DC143C">新郎苏新皓</span>
            </div>
            <div class="oath-text">
                <p>我们决定</p>
                <p>把我变成我们</p>
                <p>把今天变成</p>
                <p>每一天</p>
            </div>
        </div>

        <!-- 唯粉互动气泡 -->
        <div id="fanBubble" class="fan-bubble hidden">
            <div class="bubble-content">
                <span id="fanText"></span>
            </div>
        </div>

        <!-- CP合影弹窗 -->
        <div id="cpModal" class="cp-modal hidden">
            <div class="cp-photo">
                <div class="veil"></div>
                <div class="cp-left" id="cpLeft"></div>
                <div class="cp-right" id="cpRight"></div>
                <div class="cp-nameplate" id="cpNameplate"></div>
            </div>
            <div class="cp-petals" id="cpPetals"></div>
        </div>

        <!-- 五人同框彩蛋 -->
        <div id="groupModal" class="group-modal hidden">
            <div class="group-title">✨ TOP登陆少年 ✨</div>
            <div class="group-photos">
                <div class="group-item g0">朱志鑫</div>
                <div class="group-item g1">张泽禹</div>
                <div class="group-item g2">张　极</div>
                <div class="group-item g3">左　航</div>
                <div class="group-item g4">苏新皓</div>
            </div>
            <div class="group-fireworks" id="fireworks"></div>
        </div>

        <!-- 请柬侧边栏 -->
        <div id="inviteSidebar" class="invite-sidebar">
            <div class="invite-card">
                <h2 class="invite-title">✦ 婚礼请柬 ✦</h2>
                <div class="invite-line"></div>
                <p class="invite-greet">诚邀您出席</p>
                <ul class="invite-grooms">
                    <li style="color:#FFD700">朱志鑫</li>
                    <li style="color:#32CD32">张泽禹</li>
                    <li style="color:#FF8C00">张　极</li>
                    <li style="color:#1E90FF">左　航</li>
                    <li style="color:#DC143C">苏新皓</li>
                </ul>
                <p class="invite-oath">的婚礼</p>
                <div class="invite-line"></div>
                <p class="invite-oath">
                    我们决定<br>
                    把"我"变成"我们"<br>
                    把"今天"变成"每一天"
                </p>
                <button class="invite-close" id="inviteClose">×</button>
            </div>
        </div>

        <!-- 签到弹窗 -->
        <div id="checkinModal" class="checkin-modal hidden">
            <div class="checkin-card">
                <h3>💝 签到成功 💝</h3>
                <p class="checkin-days">今日是你爱上TOP的第n＋ <span id="daysCount">1</span> 天</p>
                <p class="checkin-total">累计签到：<span id="totalCheckin">1</span> 次</p>
                <button class="checkin-ok" id="checkinOk">好哒～</button>
            </div>
        </div>

        <!-- 闪光层 -->
        <div id="flashLayer" class="flash-layer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
